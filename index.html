<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eye Roller</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta property="og:title" content="Eye Roller" />
    <meta
      property="og:description"
      content="A video mirror that puts a rolling pupil in each one of your eyes. Pupils tumble inside your real sockets under gravity and head movement."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/og-image.jpg" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #000;
        color: #fff;
        font-family: "SF Mono", "Cascadia Mono", "Fira Mono", "Consolas", monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }
      canvas { display: block; position: fixed; inset: 0; }
      #gl { pointer-events: none; }
      video { display: none; }
      #loading {
        position: absolute;
        font-size: 0.8rem;
        letter-spacing: 0.05em;
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <div id="loading">loading...</div>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <canvas id="gl"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
